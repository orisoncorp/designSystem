<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- Full symbol: use at 48px and above (inner circle visible) -->
  <symbol id="symbol-full" viewBox="0 0 110 110">
    <circle cx="55" cy="55" r="46" stroke="currentColor" stroke-width="2" fill="none"/>
    <circle cx="55" cy="55" r="29" stroke="currentColor" stroke-width="0.9" fill="none" opacity="0.28"/>
    <line x1="55" y1="9" x2="55" y2="101" stroke="var(--color-crimson)" stroke-width="1.8" opacity="0.9"/>
  </symbol>

  <!-- Favicon symbol: use below 48px (inner circle removed for legibility) -->
  <symbol id="symbol-favicon" viewBox="0 0 110 110">
    <circle cx="55" cy="55" r="46" stroke="currentColor" stroke-width="3.5" fill="none"/>
    <line x1="55" y1="9" x2="55" y2="101" stroke="var(--color-crimson)" stroke-width="3" opacity="0.9"/>
  </symbol>

  <!-- Decoration: very large, used as background element at low opacity -->
  <symbol id="symbol-decoration" viewBox="0 0 110 110">
    <circle cx="55" cy="55" r="46" stroke="currentColor" stroke-width="1.2" fill="none"/>
    <circle cx="55" cy="55" r="29" stroke="currentColor" stroke-width="0.55" fill="none" opacity="0.28"/>
    <line x1="55" y1="9" x2="55" y2="101" stroke="currentColor" stroke-width="1.1" opacity="0.9"/>
  </symbol>

</svg>
