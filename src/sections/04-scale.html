<!-- Seção 04: escala de tamanhos do símbolo de 16px a 200px -->
<section id="sec-scale">
  <!-- Cabeçalho de seção: número, título e subtítulo -->
  <div class="sec-div">
    <span class="sec-num">04</span>
    <span class="sec-title">Comportamento em Escala</span>
    <span class="sec-sub">16px → 200px</span>
  </div>

  <!-- Barra de escala: cada .si é um item de tamanho — para adicionar um tamanho, duplique um .si e ajuste width/height/stroke-width e o texto do .si-label -->
  <div class="scale-bar">
    <!-- 16px e 24px: anel interno suprimido abaixo de 48px para garantir legibilidade -->
    <div class="si">
      <span class="si-label">16px</span>
      <!-- SVG inline: stroke-width mais grosso em tamanhos pequenos para manter visibilidade -->
      <svg width="16" height="16" viewBox="0 0 110 110" fill="none" role="img" aria-label="Símbolo 16px">
        <circle cx="55" cy="55" r="46" stroke="#e8e6e1" stroke-width="5.5" fill="none"/>
        <line x1="55" y1="9" x2="55" y2="101" stroke="#8B1A1A" stroke-width="8"/>
      </svg>
    </div>
    <div class="si">
      <span class="si-label">24px</span>
      <svg width="24" height="24" viewBox="0 0 110 110" fill="none" role="img" aria-label="Símbolo 24px">
        <circle cx="55" cy="55" r="46" stroke="#e8e6e1" stroke-width="3.5" fill="none"/>
        <line x1="55" y1="9" x2="55" y2="101" stroke="#8B1A1A" stroke-width="5"/>
      </svg>
    </div>
    <!-- 32px em diante: anel interno (r=29) reintroduzido com opacidade crescente conforme o tamanho aumenta -->
    <div class="si">
      <span class="si-label">32px</span>
      <svg width="32" height="32" viewBox="0 0 110 110" fill="none" role="img" aria-label="Símbolo 32px">
        <circle cx="55" cy="55" r="46" stroke="#e8e6e1" stroke-width="2.5" fill="none"/>
        <circle cx="55" cy="55" r="29" stroke="#e8e6e1" stroke-width="1" fill="none" opacity="0.18"/>
        <line x1="55" y1="9" x2="55" y2="101" stroke="#8B1A1A" stroke-width="3.5"/>
      </svg>
    </div>
    <div class="si">
      <span class="si-label">48px</span>
      <svg width="48" height="48" viewBox="0 0 110 110" fill="none" role="img" aria-label="Símbolo 48px">
        <circle cx="55" cy="55" r="46" stroke="#e8e6e1" stroke-width="1.8" fill="none"/>
        <circle cx="55" cy="55" r="29" stroke="#e8e6e1" stroke-width="0.7" fill="none" opacity="0.22"/>
        <line x1="55" y1="9" x2="55" y2="101" stroke="#8B1A1A" stroke-width="2.2"/>
      </svg>
    </div>
    <div class="si">
      <span class="si-label">64px</span>
      <svg width="64" height="64" viewBox="0 0 110 110" fill="none" role="img" aria-label="Símbolo 64px">
        <circle cx="55" cy="55" r="46" stroke="#e8e6e1" stroke-width="1.4" fill="none"/>
        <circle cx="55" cy="55" r="29" stroke="#e8e6e1" stroke-width="0.6" fill="none" opacity="0.26"/>
        <line x1="55" y1="9" x2="55" y2="101" stroke="#8B1A1A" stroke-width="1.4"/>
      </svg>
    </div>
    <!-- 120px e 200px: usam o sprite #symbol-full via <use> para incluir todos os detalhes do símbolo completo -->
    <div class="si">
      <span class="si-label">120px</span>
      <svg class="symbol" width="120" height="120" role="img" aria-label="Símbolo 120px" style="color: var(--color-offwhite)">
        <use href="#symbol-full"/>
      </svg>
    </div>
    <div class="si">
      <span class="si-label">200px</span>
      <svg class="symbol" width="200" height="200" role="img" aria-label="Símbolo 200px" style="color: var(--color-offwhite)">
        <use href="#symbol-full"/>
      </svg>
    </div>
  </div>
</section>
