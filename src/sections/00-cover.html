<!-- Seção de capa: ocupa a viewport inteira; layout definido por .cover em layout.css -->
<section id="sec-cover">
  <!-- Layout de duas colunas (esquerda/direita) via .cover -->
  <div class="cover">
    <!-- Coluna esquerda: nome da marca e linha descritora — edite o <h1> e o <p> para mudar o texto -->
    <div class="cover-left">
      <h1>Orison</h1>
      <p>Brand Identity System · Version 2.0 · Confidential · 2026</p>
    </div>
    <!-- Coluna direita: versão e metadados — cada <span> é uma linha; duplique para adicionar, remova para excluir -->
    <div class="cover-right">
      <span class="ver">V 2.0</span>
      <span>AI Infrastructure · B2B</span>
      <span>Brazil</span>
    </div>
  </div>
</section>
